<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Irrigation Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Smart Irrigation Dashboard</h1>

    <section id="brokerCard" class="card">
      <h2>Broker Login</h2>

      <label>Username</label>
      <input id="brokerUser" placeholder="hivemq username" />

      <label>Password</label>
      <input id="brokerPass" type="password" placeholder="hivemq password" />

      <div class="row">
        <label><input id="rememberCfg" type="checkbox" checked /> Remember config</label>
        <label><input id="autoConnect" type="checkbox" checked /> Auto connect on load</label>
      </div>

      <button id="btnConnect">Connect</button>
      <p id="status">Disconnected</p>
    </section>

    <section class="card">
      <h2>Live Data</h2>
      <p><strong>Soil moisture:</strong> <span id="moisture">-</span>%</p>
      <p><strong>Temperature:</strong> <span id="temperature">-</span> C</p>
      <p><strong>Humidity:</strong> <span id="humidity">-</span>%</p>
      <p><strong>Pump state:</strong> <span id="pumpState">-</span></p>

      <h3>Soil moisture (24h)</h3>
      <div class="chart-wrap">
        <canvas id="moistureChart" width="820" height="240"></canvas>
      </div>
      <p id="moistureChartMeta" class="chart-meta">Waiting for data...</p>
    </section>

    <section class="card">
      <h2>Pump Control</h2>
      <button id="btnOn" class="ok">Pump ON</button>
      <button id="btnOff" class="bad">Pump OFF</button>
    </section>
  </main>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="./main.js"></script>
</body>
</html>
